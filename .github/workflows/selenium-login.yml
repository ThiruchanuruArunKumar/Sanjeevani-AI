name: Sanjeevani AI CI/CD & Selenium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Start Preview Server in Background
        run: npx vite preview --port 5173 &

      - name: Wait for Server Availability
        run: npx --yes wait-on http://127.0.0.1:5173 --timeout 30000

      - name: Execute Selenium E2E Tests
        env:
          TEST_URL: http://127.0.0.1:5173
        run: npm run login
